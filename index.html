<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPL Voter Search</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    padding:12px 20px;
    cursor:pointer;
}

.result{
    background:white;
    border-radius:8px;
    padding:15px;
    margin-bottom:10px;
    box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

.info{
    color:#666;
    margin-bottom:10px;
}

.loading{
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>BPL Voter Search</h1>

<div class="info">
Search by Name(Telugu only),House Number EPIC Number, Age or any text.
</div>

<div id="status" class="loading">
Loading voter database...
</div>

<div class="search-box">
<input
    type="text"
    id="searchBox"
    placeholder="Enter Name(Telugu Only) / House No / EPIC"
    onkeyup="if(event.key==='Enter') searchData();">

<button onclick="searchData()">
Search
</button>
</div>

<div style="margin-top:10px">
<select id="filterType" disabled onchange="filterResults()" style="width:100%;padding:10px;margin-bottom:10px;">
    <option value="all">All Fields</option>
    <option value="name">Name</option>
    <option value="house">House Number</option>
    <option value="age">Age</option>
    <option value="epic">EPIC</option>
    <option value="pdf">PDF / Booth</option>
    <option value="page">Page Number</option>
</select>

<input
type="text"
id="filterBox"
disabled
placeholder="Filter current results..."
onkeyup="filterResults()"
style="width:100%;padding:10px;margin-bottom:10px;">
</div>

<div id="results"></div>

<script>

let voterData = [];
let filteredData = [];
let currentPage = 1;
const pageSize = 100;

fetch("voters.json")
.then(response => response.json())
.then(data => {

    voterData = data;
    voterData.forEach(v => {

   v.searchText =
(
    (v.details || "") + " " +
    (v.house_no || "") + " " +
    (v.epic || "") + " " +
    (v.age || "") + " " +
    (v.pdf || "") + " " +
    (v.page || "")
).toLowerCase();

});

    document.getElementById("status").innerHTML =
        "Loaded " + data.length + " voter records";

})
.catch(error => {

    document.getElementById("status").innerHTML =
        "ERROR: voters.json not found";

    console.error(error);

});

function searchData(){

    const query =
        document.getElementById("searchBox")
        .value
        .trim()
        .toLowerCase();

    if(query.length < 3){

        document.getElementById("results").innerHTML =
            "Enter at least 3 characters";

        return;
    }

    filteredData = voterData.filter(v =>
        v.searchText &&
        v.searchText.includes(query)
    );

    currentPage = 1;
    document.getElementById("filterType").disabled = false;
document.getElementById("filterBox").disabled = false;

    renderPage();
}

function renderPage(){

    let start = (currentPage - 1) * pageSize;
    let end = start + pageSize;

    let pageData = filteredData.slice(start,end);

    let html =
        "<h3>Total Matches: " +
        filteredData.length +
        "</h3>";

    pageData.forEach(v => {

       html += `
<div class="result">

<div style="
font-size:18px;
font-weight:bold;
color:#006400;
margin-bottom:8px;">
${v.details || ""}
</div>

<b>🏠 House No:</b> ${v.house_no || "-"}<br>

<b>🎂 Age:</b> ${v.age || "-"}<br>

<b>🆔 EPIC:</b> ${v.epic || "-"}<br>

<b>📄 Booth/PDF:</b> ${v.pdf || "-"}<br>

<b>📑 Page:</b> ${v.page || "-"}

</div>
`;
    });

    let totalPages =
        Math.ceil(filteredData.length / pageSize);

    html += `
    <div style="text-align:center;margin-top:20px;">
    `;

    if(currentPage > 1){
        html +=
        `<button onclick="changePage(${currentPage-1})">
        Previous
        </button>`;
    }

    html += ` Page ${currentPage} of ${totalPages} `;

    if(currentPage < totalPages){
        html +=
        `<button onclick="changePage(${currentPage+1})">
        Next
        </button>`;
    }

    html += `</div>`;

    document.getElementById("results").innerHTML =
        html;
}

function changePage(page){

    currentPage = page;

    renderPage();

    window.scrollTo(0,0);
}

function filterResults(){

    let q =
    document.getElementById("filterBox")
    .value
    .trim()
    .toLowerCase();
    let type =
document.getElementById("filterType").value;
    console.log("Selected:", type);

    if(q === ""){

        renderPage();
        return;
    }

    let html = "";
    let count = 0;

    filteredData.forEach(v => {

        let searchable =
JSON.stringify(v).toLowerCase();
let match = false;

if(type === "all"){

```
match = searchable.includes(q);
```

}
else if(type === "name"){

```
match = (v.details || "")
    .toLowerCase()
    .includes(q);
```

}
else if(type === "house"){

```
match = (v.house_no || "")
    .toLowerCase() === q;
```

}
else if(type === "age"){

```
match = String(v.age || "")
    .toLowerCase() === q;
```

}
else if(type === "epic"){

```
match = (v.epic || "")
    .toLowerCase()
    .includes(q);
```

}
else if(type === "pdf"){

```
match = (v.pdf || "")
    .toLowerCase()
    .includes(q);
```

}
else if(type === "page"){

```
match = String(v.page || "")
    .toLowerCase() === q;
```

}

if(match){


            count++;

            html += `
            <div class="result">

                <b>Details:</b> ${v.details || ""}<br>

                <b>House No:</b> ${v.house_no || ""}<br>

                <b>Age:</b> ${v.age || ""}<br>

                <b>EPIC:</b> ${v.epic || ""}<br>

                <b>PDF:</b> ${v.pdf || ""}<br>

                <b>Page:</b> ${v.page || ""}

            </div>
            `;
        }
    });

    document.getElementById("results").innerHTML =
    "<h3>Filtered Matches: " +
    count +
    "</h3>" +
    html;
}
</script>

</body>
</html>
